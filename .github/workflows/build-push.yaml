name: Build and Deploy (Production)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create env file from secret
        run: echo "${{ secrets.ENV_FILE_PROD }}" > .env

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          docker buildx build \
            --build-arg NODE_ENV=production \
            -t cayroshop/cayro-multi-store-frontend:prod-latest \
            -t cayroshop/cayro-multi-store-frontend:prod-${{ github.run_number }} \
            --push .

      - name: Deploy on Droplet
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /opt/cayro-erp-prod
            docker compose pull cayro-multi-store-frontend-prod
            docker compose up -d --no-deps cayro-multi-store-frontend-prod
            docker image prune -f
